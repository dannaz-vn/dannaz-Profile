    <script>
        // --- 1. HIỆU ỨNG ĐỐM SÁNG RƠI LẤP LÁNH (PARTICLES) ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 60;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 + 0.2; // Rơi xuống nhẹ nhàng
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#a855f7'; // Đốm màu tím nhẹ lấp lánh
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#a855f7';
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // --- 2. XỬ LÝ TỰ ĐỘNG PHÁT NHẠC (AUTOPLAY BẬT SẴN) ---
        const music = document.getElementById('bg-music');
        const toggleBtn = document.getElementById('music-toggle');
        const icon = document.getElementById('music-icon');

        // Do chính sách bảo mật của các trình duyệt hiện đại, nhạc chỉ phát tự động
        // ngay khi người dùng click bất kỳ đâu trên màn hình lần đầu tiên.
        function attemptAutoplay() {
            music.play().then(() => {
                icon.classList.add('fa-spin'); // Nhạc chạy thì icon quay mượt
                document.removeEventListener('click', attemptAutoplay);
            }).catch(error => {
                console.log("Trình duyệt chặn tự động phát, chờ tương tác người dùng...");
            });
        }
        
        document.addEventListener('click', attemptAutoplay);

        // Nút bấm bật tắt nhạc thủ công
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Không kích hoạt cái click toàn trang ở trên
            if (music.paused) {
                music.play();
                icon.className = 'fa-solid fa-music fa-spin text-purple-400';
            } else {
                music.pause();
                icon.className = 'fa-solid fa-music text-white/50';
            }
        });
    </script>
